name = "tg-image-r2"
main = "src/index.js"
compatibility_date = "2026-05-01"

# ═══════════════════════════════════════════
# Cloudflare R2 — 图片存储
# ═══════════════════════════════════════════
[[r2_buckets]]
binding = "IMG_BUCKET"
bucket_name = "请替换为你的R2-Bucket名称"

# ═══════════════════════════════════════════
# KV — 元数据存储 (需先创建)
# 运行: npx wrangler kv namespace create IMG_KV
# ═══════════════════════════════════════════
[[kv_namespaces]]
binding = "IMG_KV"
id = "请替换为你的KV-ID"
preview_id = "请替换为你的KV-ID"

# ═══════════════════════════════════════════
# 环境变量
# ═══════════════════════════════════════════
[vars]
# 允许使用的用户（逗号分隔，不要 @），留空 = 所有人可用
# 例: ALLOWED_USERS = "zhangsan,lisi"
ALLOWED_USERS = "你的TG用户名"
# 管理员用户名（逗号分隔，不要 @），可删任意图片
# 例: ADMIN_USERNAMES = "zhangsan"
ADMIN_USERNAMES = "你的TG用户名"
# R2 绑定的公开域名（不要尾部斜杠）
# 例: PUBLIC_URL = "https://img.example.com"
PUBLIC_URL = "https://你的R2域名"
# Telegram Bot 用户名（不要 @），用于管理面板 Telegram 登录
# 例: TELEGRAM_BOT_USERNAME = "myimagebot"
TELEGRAM_BOT_USERNAME = "你的Bot用户名"
# Worker 域名（仅当 Bot 域名 ≠ R2 域名时需配置，解决 Bot /login 链接 404）
# 例: ADMIN_URL = "https://你的Worker域名.workers.dev"
ADMIN_URL = "https://你的Worker域名.workers.dev"

# ═══════════════════════════════════════════
# Secret (通过 wrangler secret put 设置，不要写在文件里)
# ═══════════════════════════════════════════
#   wrangler secret put BOT_TOKEN           # Telegram Bot Token（必填）
#   wrangler secret put WEBHOOK_SECRET      # Webhook 验证密钥（强烈建议）
